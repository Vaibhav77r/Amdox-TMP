# Server
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:XuikGxTlmhhzwTzqRBxEnIWrpziNllCM@postgres.railway.internal:5432/railway
spring.datasource.username=postgres
spring.datasource.password=XuikGxTlmhhzwTzqRBxEnIWrpziNllCM
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# JPA — use 'create' to wipe and recreate all tables fresh
# After first successful deploy, change this back to 'update'
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:amdox_default_secret_key_please_change_in_production_32chars}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.amdox=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG