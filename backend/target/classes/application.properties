# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIG (PostgreSQL - Railway)
# ===============================
spring.datasource.url=jdbc:postgresql://junction.proxy.rlwy.net:58664/railway
spring.datasource.username=postgres
spring.datasource.password=XuikGxTlmhhzwTzqRBxEnIWrpziNllCM
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.initialization-fail-timeout=60000

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ===============================
# JWT CONFIG
# ===============================
app.jwt.secret=${JWT_SECRET:amdox_default_secret_key_please_change}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# CORS CONFIG
# ===============================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING CONFIG
# ===============================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.com.amdox=DEBUG